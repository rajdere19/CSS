<!DOCTYPE html>
<html>
<head>
<title>Raj Dere</title>
</head>
<body>
<h2>JSON Object</h2>
<p id="result"></p>
<script>
// Creating JSON Object
let Person = {
"name": "Raj",
"age": 20,
"city": "Satara"
};
// Accessing JSON Object
let output = "Name: " + Person.name + "<br>" +
"Age: " + Person.age + "<br>" +
"city: " + Person.city + "<br>" ;
// Display on webpage
document.getElementById("result").innerHTML = output;
</script>
</body>
</html>
