<!DOCTYPE html>
<html>
<head>
<title>Raj Dere</title>
</head>
<body>
<h2>JSON Object</h2>
<p id="result"></p>
<script>
// Creating JSON Object
let employee = {
"name": "Raj",
"age": 19,
};

// Accessing JSON Object
let output = "Employee Name: " + employee.name + "<br>" +
"Age: " + employee.age + "<br>" ;
// Display on webpage
document.getElementById("result").innerHTML = output;
</script>
</body>
</html>
