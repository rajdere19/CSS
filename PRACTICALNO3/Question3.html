<!DOCTYPE html>
<html>
<head>
<title>Raj Dere</title>
</head>
<body>
<h2>JSON Object </h2>
<p id="result"></p>
<script>
// Creating JSON Object
let student = {
"name": "Raj",
"rollno": 20,
"marks":96.47
};
// Accessing JSON Object
let output = "Name: " + student.name + "<br>" +
"rollno: " + student.rollno + "<br>" +
"marks" + student.marks + "<br>" ;
// Display on webpage
document.getElementById("result").innerHTML = output;
</script>
</body>
</html>
