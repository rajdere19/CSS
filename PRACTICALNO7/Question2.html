<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <title>AngularJS Two Way Data Binding</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="myCtrl">

<h2>Information</h2>

<form name="myForm" ng-submit="submitForm()">
    <label>Name:</label>
    <input type="text" ng-model="username" required>
    <br><br>

    <label>Email:</label>
    <input type="email" ng-model="email" required>
    <br><br>

    <label>Age:</label>
    <input type="number" ng-model="age" required>
    <br><br>

    <label>Gender:</label>
    <select ng-model="gender" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>
    <br><br>

    <button type="submit" ng-disabled="myForm.$invalid">Submit</button>
</form>

<div ng-show="submitted">
    <h3>Your name is: {{ submittedData.username }}</h3>
    <h3>Your email is: {{ submittedData.email }}</h3>
    <h3>Your age is: {{ submittedData.age }}</h3>
    <h3>Your gender is: {{submittedData.gender }}</h3>
</div>

<script>
    var app = angular.module("myApp", []);

    app.controller("myCtrl", function($scope) {
        $scope.submitted = false;

        $scope.submitForm = function () {
            $scope.submittedData = {
                username: $scope.username,
                email: $scope.email,
                age: $scope.age,
                gender: $scope.gender
            };
            $scope.submitted = true;
        };
    });
</script>

</body>
</html>
